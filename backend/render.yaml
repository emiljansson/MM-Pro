services:
  - type: web
    name: mathmaster-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: mathmaster
      - key: JWT_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
    healthCheckPath: /api/health
